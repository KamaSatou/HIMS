# ═══════════════════════════════════════════
#  MedCore — application.properties
#  Cấu hình Spring Boot + MySQL + JWT
# ═══════════════════════════════════════════

# Server
server.port=8081

# ── MySQL ──
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=Satou
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# server.port=8081

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ──
app.jwt.secret=MedCoreHospital2026SecretKeyMustBe256BitsLongForHS256Algorithm!!
app.jwt.expiration=86400000

# ── File Upload ──
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Logging ──
logging.level.com.hospital=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.results.graph.AST=TRACE

# ── CORS (chỉnh lại nếu frontend chạy port khác) ──
app.cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000

# ── App Config ──
app.name=MedCore Hospital Management System
app.hospital.name=Bệnh Viện Đa Khoa Phúc Yên
app.hospital.address=123 Đường Ngô Gia Tự, Phúc Yên, Vĩnh Phúc
app.hospital.phone=0211 3868 xxx